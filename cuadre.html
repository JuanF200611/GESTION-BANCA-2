<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bancas Kiko - Cuadre de Banca</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background: #f5f5f5;
            padding: 20px;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        .header {
            background: white;
            padding: 20px;
            border-radius: 12px 12px 0 0;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }

        .header h1 {
            color: #1976d2;
            font-size: 24px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .card {
            background: white;
            padding: 25px;
            border-radius: 0 0 12px 12px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }

        .filtros-row {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 15px;
            margin-bottom: 20px;
        }

        .form-group {
            margin-bottom: 15px;
        }

        .form-group label {
            display: block;
            margin-bottom: 5px;
            color: #555;
            font-weight: 500;
            font-size: 13px;
        }

        .form-control {
            width: 100%;
            padding: 10px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 14px;
        }

        .form-control:focus {
            border-color: #1976d2;
            outline: none;
        }

        .btn {
            padding: 10px 20px;
            border: none;
            border-radius: 8px;
            font-weight: 600;
            cursor: pointer;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            font-size: 14px;
        }

        .btn-primary { background: #1976d2; color: white; }
        .btn-success { background: #27ae60; color: white; }
        .btn-warning { background: #f39c12; color: white; }
        .btn-info { background: #00acc1; color: white; }
        .btn-danger { background: #e74c3c; color: white; }

        .resumen-automatico {
            background: #e3f2fd;
            padding: 20px;
            border-radius: 8px;
            margin-bottom: 20px;
        }

        .resumen-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
            gap: 15px;
            margin-top: 15px;
        }

        .resumen-item {
            background: white;
            padding: 12px;
            border-radius: 8px;
        }

        .resumen-item strong {
            display: block;
            font-size: 18px;
            color: #1976d2;
            margin-top: 5px;
        }

        .denominaciones-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(100px, 1fr));
            gap: 10px;
            margin: 20px 0;
        }

        .denominacion-item {
            background: #f8f9fa;
            padding: 10px;
            border-radius: 8px;
        }

        .denominacion-item label {
            font-size: 12px;
            color: #666;
            display: block;
            margin-bottom: 5px;
        }

        .resultados-cuadre {
            background: #f8f9fa;
            padding: 20px;
            border-radius: 8px;
            margin: 20px 0;
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
            gap: 15px;
        }

        .resultado-item {
            background: white;
            padding: 15px;
            border-radius: 8px;
            text-align: center;
        }

        .resultado-item span {
            display: block;
            font-size: 12px;
            color: #666;
            margin-bottom: 5px;
        }

        .resultado-item strong {
            font-size: 18px;
            color: #333;
        }

        .info-box {
            background: #fff3cd;
            border: 1px solid #ffeeba;
            border-radius: 8px;
            padding: 15px;
        }

        .acciones {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            justify-content: flex-end;
            margin-top: 20px;
            padding-top: 20px;
            border-top: 2px solid #f0f0f0;
        }

        .text-success { color: #27ae60; }
        .text-danger { color: #e74c3c; }
        .text-warning { color: #f39c12; }

        @media (max-width: 768px) {
            .filtros-row {
                grid-template-columns: 1fr;
            }
            
            .denominaciones-grid {
                grid-template-columns: repeat(2, 1fr);
            }
            
            .btn {
                width: 100%;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>
                <i class="fa-solid fa-calculator"></i>
                Cuadre de Banca
            </h1>
        </div>

        <div class="card">
            <!-- Filtros -->
            <div class="filtros-row">
                <div class="form-group">
                    <label>Desde:</label>
                    <input type="date" id="cuadreFechaDesde" class="form-control">
                </div>
                <div class="form-group">
                    <label>Hasta:</label>
                    <input type="date" id="cuadreFechaHasta" class="form-control">
                </div>
                <div class="form-group">
                    <label>Banca:</label>
                    <select id="bancaSelect" class="form-control">
                        <option value="kiko1">Banca Kiko 1</option>
                        <option value="kiko2">Banca Kiko 2</option>
                        <option value="kiko3">Banca Kiko 3</option>
                    </select>
                </div>
            </div>

            <!-- Información de la banca -->
            <div style="display: grid; grid-template-columns: repeat(3, 1fr); gap: 15px; margin-bottom: 20px;">
                <div class="info-box">
                    <label>Fondo Inicial:</label>
                    <div style="font-size: 20px; font-weight: bold;" id="fondoBaseBanca">RD$ 0</div>
                </div>
                <div class="info-box">
                    <label>Deuda Clientes:</label>
                    <div style="font-size: 20px; font-weight: bold;" id="deudaClientesTotal">RD$ 0</div>
                </div>
                <div class="info-box">
                    <label>Fondo Disponible:</label>
                    <div style="font-size: 20px; font-weight: bold;" id="fondoDisponibleBanca">RD$ 0</div>
                </div>
            </div>

            <!-- Datos automáticos -->
            <div class="resumen-automatico">
                <h4 style="margin-bottom: 15px;">📊 Datos del Período</h4>
                <div class="resumen-grid">
                    <div class="resumen-item">
                        <span>Préstamos Kiko</span>
                        <strong id="prestamosComision">RD$ 0</strong>
                    </div>
                    <div class="resumen-item">
                        <span>Préstamos Central</span>
                        <strong id="prestamosCentral">RD$ 0</strong>
                    </div>
                    <div class="resumen-item">
                        <span>Devoluciones</span>
                        <strong id="devolucionesPeriodo">RD$ 0</strong>
                    </div>
                    <div class="resumen-item">
                        <span>Recargas</span>
                        <strong id="recargasPeriodo">RD$ 0</strong>
                    </div>
                    <div class="resumen-item">
                        <span>Gastos</span>
                        <strong id="gastosPeriodo">RD$ 0</strong>
                    </div>
                    <div class="resumen-item">
                        <span>Transferencias</span>
                        <strong id="transferenciasPeriodo">RD$ 0</strong>
                    </div>
                </div>
            </div>

            <!-- Efectivo -->
            <h4>💰 Efectivo en Caja</h4>
            <div class="denominaciones-grid">
                <div class="denominacion-item">
                    <label>RD$ 2000</label>
                    <input type="number" id="billete2000" class="form-control" min="0" value="0">
                </div>
                <div class="denominacion-item">
                    <label>RD$ 1000</label>
                    <input type="number" id="billete1000" class="form-control" min="0" value="0">
                </div>
                <div class="denominacion-item">
                    <label>RD$ 500</label>
                    <input type="number" id="billete500" class="form-control" min="0" value="0">
                </div>
                <div class="denominacion-item">
                    <label>RD$ 200</label>
                    <input type="number" id="billete200" class="form-control" min="0" value="0">
                </div>
                <div class="denominacion-item">
                    <label>RD$ 100</label>
                    <input type="number" id="billete100" class="form-control" min="0" value="0">
                </div>
                <div class="denominacion-item">
                    <label>RD$ 50</label>
                    <input type="number" id="billete50" class="form-control" min="0" value="0">
                </div>
                <div class="denominacion-item">
                    <label>RD$ 25</label>
                    <input type="number" id="moneda25" class="form-control" min="0" value="0">
                </div>
                <div class="denominacion-item">
                    <label>RD$ 10</label>
                    <input type="number" id="moneda10" class="form-control" min="0" value="0">
                </div>
                <div class="denominacion-item">
                    <label>RD$ 5</label>
                    <input type="number" id="moneda5" class="form-control" min="0" value="0">
                </div>
                <div class="denominacion-item">
                    <label>RD$ 1</label>
                    <input type="number" id="moneda1" class="form-control" min="0" value="0">
                </div>
            </div>

            <!-- Resultados -->
            <div class="resultados-cuadre">
                <div class="resultado-item">
                    <span>Total Efectivo</span>
                    <strong id="totalEfectivo">RD$ 0</strong>
                </div>
                <div class="resultado-item">
                    <span>Fondo Inicial</span>
                    <strong id="fondoBaseDisplay">RD$ 0</strong>
                </div>
                <div class="resultado-item">
                    <span>Debe Haber</span>
                    <strong id="totalDeberia">RD$ 0</strong>
                </div>
                <div class="resultado-item">
                    <span>Diferencia</span>
                    <strong id="diferenciaCuadre">RD$ 0</strong>
                </div>
                <div class="resultado-item">
                    <span>Estado</span>
                    <strong id="estadoCuadre">✅ NORMAL</strong>
                </div>
                <div class="resultado-item">
                    <span>Fondo Final</span>
                    <strong id="fondoNuevo">RD$ 0</strong>
                </div>
            </div>

            <!-- Botones -->
            <div class="acciones">
                <button class="btn btn-primary" onclick="cargarDatos()">
                    <i class="fa-solid fa-rotate"></i> Cargar
                </button>
                <button class="btn btn-success" onclick="guardarCuadre()">
                    <i class="fa-solid fa-save"></i> Guardar
                </button>
                <button class="btn btn-warning" onclick="calcularTodo()">
                    <i class="fa-solid fa-calculator"></i> Calcular
                </button>
                <button class="btn btn-info" onclick="imprimirCuadre()">
                    <i class="fa-solid fa-print"></i> Imprimir
                </button>
            </div>
        </div>
    </div>

    <script>
        // Variables de ejemplo (luego se conectan con Firebase)
        let bancas = {
            kiko1: { nombre: 'Banca Kiko 1', fondo: 15000 },
            kiko2: { nombre: 'Banca Kiko 2', fondo: 20000 },
            kiko3: { nombre: 'Banca Kiko 3', fondo: 18000 }
        };

        let clientes = [
            { id: '1', nombre: 'Juan Pérez', banca: 'kiko1', deuda: 500, credito: 1000 },
            { id: '2', nombre: 'María García', banca: 'kiko1', deuda: 1200, credito: 500 }
        ];

        let prestamos = [
            { banca: 'kiko1', tipo: 'kiko_comision', fecha: '2026-02-20', monto: 5000 },
            { banca: 'kiko1', tipo: 'central', fecha: '2026-02-21', monto: 3000 }
        ];

        let deudas = [
            { clienteId: '1', tipo: 'pago', fecha: '2026-02-21', monto: -200 }
        ];

        let gastos = [
            { banca: 'kiko1', tipo: 'dieta', fecha: '2026-02-21', monto: 500 }
        ];

        let transferencias = [
            { banca: 'kiko1', fecha: '2026-02-21', monto: 2000 }
        ];

        function cargarDatos() {
            const desde = document.getElementById('cuadreFechaDesde').value;
            const hasta = document.getElementById('cuadreFechaHasta').value;
            const banca = document.getElementById('bancaSelect').value;

            if (!desde || !hasta) {
                alert('Seleccione el rango de fechas');
                return;
            }

            // Fondo de banca
            const fondo = bancas[banca]?.fondo || 0;
            document.getElementById('fondoBaseBanca').textContent = `RD$ ${fondo.toFixed(2)}`;
            
            // Deuda clientes
            const clientesBanca = clientes.filter(c => c.banca === banca);
            const totalDeuda = clientesBanca.reduce((s, c) => s + (c.deuda || 0), 0);
            document.getElementById('deudaClientesTotal').textContent = `RD$ ${totalDeuda.toFixed(2)}`;
            
            // Fondo disponible
            const fondoDisponible = fondo - totalDeuda;
            document.getElementById('fondoDisponibleBanca').textContent = `RD$ ${fondoDisponible.toFixed(2)}`;

            // Préstamos
            const prestamosComision = prestamos
                .filter(p => p.banca === banca && p.tipo === 'kiko_comision' && p.fecha >= desde && p.fecha <= hasta)
                .reduce((s, p) => s + (p.monto || 0), 0);
            document.getElementById('prestamosComision').textContent = `RD$ ${prestamosComision.toFixed(2)}`;

            const prestamosCentral = prestamos
                .filter(p => p.banca === banca && p.tipo === 'central' && p.fecha >= desde && p.fecha <= hasta)
                .reduce((s, p) => s + (p.monto || 0), 0);
            document.getElementById('prestamosCentral').textContent = `RD$ ${prestamosCentral.toFixed(2)}`;

            // Devoluciones
            const devoluciones = deudas
                .filter(d => {
                    const cliente = clientes.find(c => c.id === d.clienteId);
                    return cliente?.banca === banca && d.tipo === 'pago' && d.fecha >= desde && d.fecha <= hasta;
                })
                .reduce((s, d) => s + Math.abs(d.monto), 0);
            document.getElementById('devolucionesPeriodo').textContent = `RD$ ${devoluciones.toFixed(2)}`;

            // Recargas
            const recargas = gastos
                .filter(g => g.tipo === 'recarga' && g.banca === banca && g.fecha >= desde && g.fecha <= hasta)
                .reduce((s, g) => s + (g.monto || 0), 0);
            document.getElementById('recargasPeriodo').textContent = `RD$ ${recargas.toFixed(2)}`;

            // Gastos
            const gastosTotal = gastos
                .filter(g => g.banca === banca && g.fecha >= desde && g.fecha <= hasta && g.tipo !== 'recarga')
                .reduce((s, g) => s + (g.monto || 0), 0);
            document.getElementById('gastosPeriodo').textContent = `RD$ ${gastosTotal.toFixed(2)}`;

            // Transferencias
            const transferenciasTotal = transferencias
                .filter(t => t.banca === banca && t.fecha >= desde && t.fecha <= hasta)
                .reduce((s, t) => s + (t.monto || 0), 0);
            document.getElementById('transferenciasPeriodo').textContent = `RD$ ${transferenciasTotal.toFixed(2)}`;

            calcularTodo();
        }

        function calcularEfectivo() {
            const denominaciones = [
                { id: 'billete2000', valor: 2000 },
                { id: 'billete1000', valor: 1000 },
                { id: 'billete500', valor: 500 },
                { id: 'billete200', valor: 200 },
                { id: 'billete100', valor: 100 },
                { id: 'billete50', valor: 50 },
                { id: 'moneda25', valor: 25 },
                { id: 'moneda10', valor: 10 },
                { id: 'moneda5', valor: 5 },
                { id: 'moneda1', valor: 1 }
            ];

            let total = 0;
            denominaciones.forEach(d => {
                const cantidad = parseInt(document.getElementById(d.id)?.value) || 0;
                total += d.valor * cantidad;
            });

            document.getElementById('totalEfectivo').textContent = `RD$ ${total.toFixed(2)}`;
            return total;
        }

        function calcularTodo() {
            const totalEfectivo = calcularEfectivo();
            const fondoBase = parseFloat(document.getElementById('fondoBaseBanca').textContent.replace('RD$ ', '')) || 0;
            
            document.getElementById('fondoBaseDisplay').textContent = `RD$ ${fondoBase.toFixed(2)}`;
            
            const prestamosComision = parseFloat(document.getElementById('prestamosComision').textContent.replace('RD$ ', '')) || 0;
            const prestamosCentral = parseFloat(document.getElementById('prestamosCentral').textContent.replace('RD$ ', '')) || 0;
            const devoluciones = parseFloat(document.getElementById('devolucionesPeriodo').textContent.replace('RD$ ', '')) || 0;
            const recargas = parseFloat(document.getElementById('recargasPeriodo').textContent.replace('RD$ ', '')) || 0;
            const gastos = parseFloat(document.getElementById('gastosPeriodo').textContent.replace('RD$ ', '')) || 0;
            const transferencias = parseFloat(document.getElementById('transferenciasPeriodo').textContent.replace('RD$ ', '')) || 0;

            // Fórmula correcta
            const deberiaHaber = fondoBase + prestamosComision + prestamosCentral + recargas - devoluciones - gastos - transferencias;
            const diferencia = totalEfectivo - deberiaHaber;
            const fondoNuevo = totalEfectivo - prestamosComision - prestamosCentral - recargas + devoluciones + transferencias + gastos;

            document.getElementById('totalDeberia').textContent = `RD$ ${deberiaHaber.toFixed(2)}`;
            document.getElementById('diferenciaCuadre').textContent = `RD$ ${diferencia.toFixed(2)}`;
            document.getElementById('fondoNuevo').textContent = `RD$ ${fondoNuevo.toFixed(2)}`;
            
            const estadoElement = document.getElementById('estadoCuadre');
            
            if (Math.abs(diferencia) > 0.01) {
                if (diferencia > 0) {
                    estadoElement.textContent = '⚠️ SOBRA';
                    estadoElement.className = 'text-warning';
                } else {
                    estadoElement.textContent = '❌ FALTA';
                    estadoElement.className = 'text-danger';
                }
            } else {
                estadoElement.textContent = '✅ NORMAL';
                estadoElement.className = 'text-success';
            }

            return { diferencia, fondoNuevo };
        }

        function guardarCuadre() {
            const desde = document.getElementById('cuadreFechaDesde').value;
            const hasta = document.getElementById('cuadreFechaHasta').value;
            
            if (!desde || !hasta) {
                alert('Seleccione el rango de fechas');
                return;
            }

            const cuadre = {
                fechaDesde: desde,
                fechaHasta: hasta,
                banca: document.getElementById('bancaSelect').value,
                fondoInicial: parseFloat(document.getElementById('fondoBaseBanca').textContent.replace('RD$ ', '')) || 0,
                prestamosComision: parseFloat(document.getElementById('prestamosComision').textContent.replace('RD$ ', '')) || 0,
                prestamosCentral: parseFloat(document.getElementById('prestamosCentral').textContent.replace('RD$ ', '')) || 0,
                devoluciones: parseFloat(document.getElementById('devolucionesPeriodo').textContent.replace('RD$ ', '')) || 0,
                recargas: parseFloat(document.getElementById('recargasPeriodo').textContent.replace('RD$ ', '')) || 0,
                gastos: parseFloat(document.getElementById('gastosPeriodo').textContent.replace('RD$ ', '')) || 0,
                transferencias: parseFloat(document.getElementById('transferenciasPeriodo').textContent.replace('RD$ ', '')) || 0,
                totalEfectivo: parseFloat(document.getElementById('totalEfectivo').textContent.replace('RD$ ', '')) || 0,
                diferencia: parseFloat(document.getElementById('diferenciaCuadre').textContent.replace('RD$ ', '')) || 0,
                estado: document.getElementById('estadoCuadre').textContent,
                fondoNuevo: parseFloat(document.getElementById('fondoNuevo').textContent.replace('RD$ ', '')) || 0
            };

            // Enviar al padre si existe
            if (window.parent && window.parent.recibirCuadre) {
                window.parent.recibirCuadre(cuadre);
            }

            alert('✅ Cuadre guardado');
            console.log('Cuadre:', cuadre);
        }

        function imprimirCuadre() {
            const win = window.open('', '_blank');
            win.document.write(`
                <html>
                <head>
                    <title>Cuadre de Banca</title>
                    <style>
                        body { font-family: Arial; padding: 20px; }
                        .ticket { max-width: 400px; margin: 0 auto; }
                        h2 { color: #1976d2; }
                        hr { margin: 15px 0; }
                        .fila { display: flex; justify-content: space-between; margin: 5px 0; }
                    </style>
                </head>
                <body>
                    <div class="ticket">
                        <h2>BANCAS KIKO</h2>
                        <p>Cuadre de Banca</p>
                        <hr>
                        <div class="fila"><span>Período:</span> <strong>${document.getElementById('cuadreFechaDesde').value} al ${document.getElementById('cuadreFechaHasta').value}</strong></div>
                        <div class="fila"><span>Total Efectivo:</span> <strong>${document.getElementById('totalEfectivo').textContent}</strong></div>
                        <div class="fila"><span>Diferencia:</span> <strong>${document.getElementById('diferenciaCuadre').textContent}</strong></div>
                        <div class="fila"><span>Estado:</span> <strong>${document.getElementById('estadoCuadre').textContent}</strong></div>
                        <hr>
                        <p style="text-align: center;">${new Date().toLocaleString()}</p>
                    </div>
                    <script>window.print();<\/script>
                </body>
                </html>
            `);
            win.document.close();
        }

        // Inicializar
        window.onload = function() {
            const hoy = new Date();
            const hace7dias = new Date(hoy);
            hace7dias.setDate(hoy.getDate() - 7);
            
            document.getElementById('cuadreFechaDesde').value = hace7dias.toISOString().split('T')[0];
            document.getElementById('cuadreFechaHasta').value = hoy.toISOString().split('T')[0];
            
            // Event listeners para calcular automáticamente
            document.querySelectorAll('input[type="number"]').forEach(input => {
                input.addEventListener('input', calcularTodo);
            });
            
            cargarDatos();
        };
    </script>
</body>
</html>
